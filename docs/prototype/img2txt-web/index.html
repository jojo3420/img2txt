<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>img2txt — 스캔한 한글 책을 읽기 좋은 텍스트로</title>
    <meta
      name="description"
      content="한글 책 스캔 이미지를 OCR로 읽고, 꼬리말 제거·문단 복원·로컬 LLM 오탈자 보정까지 거쳐 읽기 좋은 텍스트로 만듭니다. 변환은 무료, 오탈자 보정은 월 4,900원."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="img2txt — 스캔한 한글 책을 읽기 좋은 텍스트로" />
    <meta
      property="og:description"
      content="한글 책 스캔 이미지를 OCR로 읽고, 꼬리말 제거·문단 복원·로컬 LLM 오탈자 보정까지 거쳐 읽기 좋은 텍스트로 만듭니다."
    />
    <script>
      // 저장된 테마 선호도를 렌더 전에 반영해 깜빡임(FOUC) 방지
      try {
        const theme = localStorage.getItem("img2txt-theme");
        if (
          theme === "dark" ||
          (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body class="bg-white dark:bg-zinc-950">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
